# ── Module Options from New/Unintegrated Inputs (requires --impure) ──────────
# Template: adapt for any new flake input's HM module before integrating it.
# Replace CAT_REV/catppuccin references with your new input's lock node name,
# GitHub owner/repo, and module attribute name.

[scopes.catppuccin-hm-standalone]
description = "Catppuccin HM Options — standalone eval (template for new inputs)"
options-list-cmd = """
CAT_REV=$(python3 -c "import json; l=json.load(open('flake.lock')); print(l['nodes']['catppuccin']['locked']['rev'])") && \
HM_REV=$(python3 -c "import json; l=json.load(open('flake.lock')); print(l['nodes']['home-manager']['locked']['rev'])") && \
nix eval --impure --json --expr "
  let
    nixpkgs = builtins.getFlake \"github:nixos/nixpkgs/nixpkgs-unstable\";
    pkgs = nixpkgs.legacyPackages.aarch64-darwin;
    lib = nixpkgs.lib;
    hm = builtins.getFlake \"github:nix-community/home-manager/${HM_REV}\";
    catppuccin = builtins.getFlake \"github:catppuccin/nix/${CAT_REV}\";
    hmCfg = hm.lib.homeManagerConfiguration {
      inherit pkgs;
      modules = [
        (catppuccin.homeModules.catppuccin or catppuccin.homeManagerModules.catppuccin)
        { home = { username = \"test\"; homeDirectory = \"/tmp/test\"; stateVersion = \"24.05\"; }; }
      ];
    };
    opts = builtins.filter (v: v.visible && !v.internal)
           (lib.optionAttrSetToDocList hmCfg.options);
  in builtins.filter (o: lib.hasPrefix \"catppuccin\" o.name)
     (builtins.map (v: builtins.removeAttrs v [\"default\" \"example\"]) opts)
"
"""
evaluator = """CAT_REV=$(python3 -c "import json; l=json.load(open('flake.lock')); print(l['nodes']['catppuccin']['locked']['rev'])") && HM_REV=$(python3 -c "import json; l=json.load(open('flake.lock')); print(l['nodes']['home-manager']['locked']['rev'])") && nix eval --impure --json --expr "let nixpkgs = builtins.getFlake \"github:nixos/nixpkgs/nixpkgs-unstable\"; pkgs = nixpkgs.legacyPackages.aarch64-darwin; lib = nixpkgs.lib; hm = builtins.getFlake \"github:nix-community/home-manager/${HM_REV}\"; catppuccin = builtins.getFlake \"github:catppuccin/nix/${CAT_REV}\"; hmCfg = hm.lib.homeManagerConfiguration { inherit pkgs; modules = [ (catppuccin.homeModules.catppuccin or catppuccin.homeManagerModules.catppuccin) { home = { username = \"test\"; homeDirectory = \"/tmp/test\"; stateVersion = \"24.05\"; }; } ]; }; in lib.getAttrFromPath (lib.splitString \".\" \"{{ .Option }}\") hmCfg.config" """
