min_score = 1
debounce_time = 25
default_scope = "darwin-macbook"
formatter_cmd = "nixfmt"

[scopes.darwin-macbook]
description = "Macbook Nix-Darwin Configuration"
options-list-cmd = """
nix eval .#darwinConfigurations.macbook --json --apply 'input: let
  inherit (input) options pkgs;
  optionsList = builtins.filter
    (v: v.visible && !v.internal)
    (pkgs.lib.optionAttrSetToDocList options);
in builtins.map
  (v: builtins.removeAttrs v [ "default" "example" ])
  optionsList'
"""
evaluator = "nix eval --json '.#darwinConfigurations.macbook.config.{{ .Option }}'"

[scopes.macbook-home]
description = "Macbook Home Manager Configuration"
options-list-cmd = """
nix eval '.#homeConfigurations.\"adampaterson@macbook\"' --json --apply 'input: let
  inherit (input) options pkgs;
  optionsList = builtins.filter
