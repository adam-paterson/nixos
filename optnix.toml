# ── Packages Scopes ──────────────────────────────────────────────────────────

[scopes.agents-packages]
description = "LLM Agents Nix Packages (inputs.agents)"
options-list-cmd = """
AGENTS_REV=$(python3 -c "import json; l=json.load(open('flake.lock')); print(l['nodes']['agents']['locked']['rev'])") && \
nix eval --json \
  "github:numtide/llm-agents.nix/${AGENTS_REV}#packages.aarch64-darwin" \
  --apply '
    let
      skip = [ "darwinOpenptyHook" "unpinGoModVersionHook" "versionCheckHomeHook"
               "flake-inputs" "formatter" "default" ];
      mkEntry = n: p: {
        name = n;
        description = (p.meta.description or "No description");
        type = "package";
        loc = [ "packages" "aarch64-darwin" n ];
        readOnly = true;
        declarations = [];
      };
    in pkgs:
      builtins.filter (e: !(builtins.elem e.name skip))
      (builtins.attrValues (builtins.mapAttrs mkEntry pkgs))
  '
"""
evaluator = """AGENTS_REV=$(python3 -c "import json; l=json.load(open('flake.lock')); print(l['nodes']['agents']['locked']['rev'])") && nix eval --json "github:numtide/llm-agents.nix/${AGENTS_REV}#packages.aarch64-darwin.{{ .Option }}" --apply 'p: { version = p.version or "unknown"; description = p.meta.description or ""; homepage = p.meta.homepage or ""; }'"""

# ── Module Options from Integrated Inputs ────────────────────────────────────

[scopes.sops-options]
description = "sops-nix Options (aurora NixOS)"
options-list-cmd = """
nix eval .#nixosConfigurations.aurora --json --apply 'c: let
  lib = c.pkgs.lib;
  opts = builtins.filter (v: v.visible && !v.internal)
         (lib.optionAttrSetToDocList c.options);
in builtins.filter (o: lib.hasPrefix "sops" o.name) opts'
"""
evaluator = "nix eval --json '.#nixosConfigurations.aurora.config.{{ .Option }}'"

