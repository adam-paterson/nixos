name: Reusable Nix Build And Push Cache

on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      runs_on:
        required: true
        type: string
      checkout_ref:
        required: true
        type: string
      cache_name:
        required: true
        type: string
      build_command:
        required: true
        type: string
      build_targets:
        required: true
        type: string
      reclaim_disk:
        required: false
        type: boolean
        default: false
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true

jobs:
  build-and-push:
    name: ${{ inputs.job_name }}
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Free Disk Space
        if: inputs.reclaim_disk
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/.ghcup
          docker system prune -af || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Validate Cachix Config
        run: |
          if [ -z "${{ inputs.cache_name }}" ]; then
            echo "::error::Cachix cache name is empty. Set repository variable CACHIX_CACHE_NAME."
            exit 1
          fi
          if [ -z "${{ secrets.CACHIX_AUTH_TOKEN }}" ]; then
            echo "::error::CACHIX_AUTH_TOKEN secret is empty."
            exit 1
          fi

      - name: Setup Cachix Push
        uses: cachix/cachix-action@v16
        with:
          name: ${{ inputs.cache_name }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build Cache Targets
        run: ${{ inputs.build_command }}

      - name: Push Built Targets To Cachix
        run: |
          set -euo pipefail

          mapfile -t targets < <(printf '%s\n' "${{ inputs.build_targets }}" | sed '/^[[:space:]]*$/d')
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "::error::No build targets were provided to cache push step."
            exit 1
          fi

          mapfile -t roots < <(nix path-info "${targets[@]}")
          if [ "${#roots[@]}" -eq 0 ]; then
            echo "::error::No root store paths were resolved from build targets."
            exit 1
          fi

          echo "Resolved ${#roots[@]} root paths to push:"
          printf '%s\n' "${roots[@]}"

          nix run nixpkgs#cachix -- push "${{ inputs.cache_name }}" "${roots[@]}"
