name: Cachix Deploy Agents

on:
  workflow_run:
    workflows:
      - NixOS Cache Build
      - macbook Cache Build
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or SHA)
        required: true
        default: main
        type: string
      deploy_nixos:
        description: Deploy NixOS host (aurora)
        required: true
        default: true
        type: boolean
      nixos_agent_name:
        description: Cachix agent name for NixOS host
        required: true
        default: aurora
        type: string
      deploy_macbook:
        description: Deploy macbook (nix-darwin)
        required: true
        default: false
        type: boolean
      macbook_agent_name:
        description: Cachix agent name for macbook
        required: true
        default: macbook
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.event.inputs.ref || github.sha }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Resolve Deploy Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.compute.outputs.should_run }}
      build_ref: ${{ steps.compute.outputs.build_ref }}
      deploy_nixos: ${{ steps.compute.outputs.deploy_nixos }}
      deploy_macbook: ${{ steps.compute.outputs.deploy_macbook }}
      nixos_agent_name: ${{ steps.compute.outputs.nixos_agent_name }}
      macbook_agent_name: ${{ steps.compute.outputs.macbook_agent_name }}
      cache_name: ${{ steps.compute.outputs.cache_name }}
    steps:
      - name: Compute Metadata
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || '' }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          INPUT_REF: ${{ github.event.inputs.ref || '' }}
          INPUT_DEPLOY_NIXOS: ${{ github.event.inputs.deploy_nixos || '' }}
          INPUT_DEPLOY_MACBOOK: ${{ github.event.inputs.deploy_macbook || '' }}
          INPUT_NIXOS_AGENT_NAME: ${{ github.event.inputs.nixos_agent_name || '' }}
          INPUT_MACBOOK_AGENT_NAME: ${{ github.event.inputs.macbook_agent_name || '' }}
          CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
        run: |
          set -euo pipefail

          should_run=false
          build_ref=
          deploy_nixos=false
          deploy_macbook=false
          nixos_agent_name=aurora
          macbook_agent_name=macbook

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            should_run=true
            build_ref="${INPUT_REF:-main}"
            deploy_nixos="${INPUT_DEPLOY_NIXOS:-true}"
            deploy_macbook="${INPUT_DEPLOY_MACBOOK:-false}"
            nixos_agent_name="${INPUT_NIXOS_AGENT_NAME:-aurora}"
            macbook_agent_name="${INPUT_MACBOOK_AGENT_NAME:-macbook}"
          elif [ "$EVENT_NAME" = "workflow_run" ] && [ "$WORKFLOW_CONCLUSION" = "success" ]; then
            should_run=true
            build_ref="$WORKFLOW_HEAD_SHA"
            if [ "$WORKFLOW_NAME" = "NixOS Cache Build" ]; then
              deploy_nixos=true
            elif [ "$WORKFLOW_NAME" = "macbook Cache Build" ]; then
              deploy_macbook=true
            fi
          fi

          cache_name="${CACHE_NAME:-adam-paterson}"

          {
            echo "should_run=$should_run"
            echo "build_ref=$build_ref"
            echo "deploy_nixos=$deploy_nixos"
            echo "deploy_macbook=$deploy_macbook"
            echo "nixos_agent_name=$nixos_agent_name"
            echo "macbook_agent_name=$macbook_agent_name"
            echo "cache_name=$cache_name"
          } >> "$GITHUB_OUTPUT"

  deploy-nixos:
    name: Deploy NixOS Agent
    needs: metadata
    if: needs.metadata.outputs.should_run == 'true' && needs.metadata.outputs.deploy_nixos == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CACHIX_CACHE_NAME: ${{ needs.metadata.outputs.cache_name }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      CACHIX_ACTIVATE_TOKEN: ${{ secrets.CACHIX_ACTIVATE_TOKEN }}
      AGENT_NAME: ${{ needs.metadata.outputs.nixos_agent_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.build_ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Validate Cachix Deploy Secrets
        run: |
          test -n "$CACHIX_CACHE_NAME"
          test -n "$CACHIX_AUTH_TOKEN"
          test -n "$CACHIX_ACTIVATE_TOKEN"
          test -n "$AGENT_NAME"

      - name: Build NixOS System (aurora)
        id: build
        run: |
          store_path="$(nix build --no-link --print-out-paths .#nixosConfigurations.aurora.config.system.build.toplevel)"
          echo "store_path=$store_path" >> "$GITHUB_OUTPUT"

      - name: Push NixOS Closure To Cachix
        run: nix run nixpkgs#cachix -- push "$CACHIX_CACHE_NAME" '${{ steps.build.outputs.store_path }}'

      - name: Activate NixOS Agent
        run: |
          jq -n \
            --arg agent "$AGENT_NAME" \
            --arg path '${{ steps.build.outputs.store_path }}' \
            '{agents: {($agent): $path}}' > deploy.json
          nix run nixpkgs#cachix -- deploy activate deploy.json --agent "$AGENT_NAME"

  deploy-macbook:
    name: Deploy macbook Agent
    needs: metadata
    if: needs.metadata.outputs.should_run == 'true' && needs.metadata.outputs.deploy_macbook == 'true'
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      CACHIX_CACHE_NAME: ${{ needs.metadata.outputs.cache_name }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      CACHIX_ACTIVATE_TOKEN: ${{ secrets.CACHIX_ACTIVATE_TOKEN }}
      AGENT_NAME: ${{ needs.metadata.outputs.macbook_agent_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.build_ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Validate Cachix Deploy Secrets
        run: |
          test -n "$CACHIX_CACHE_NAME"
          test -n "$CACHIX_AUTH_TOKEN"
          test -n "$CACHIX_ACTIVATE_TOKEN"
          test -n "$AGENT_NAME"

      - name: Build macbook Darwin System
        id: build
        run: |
          store_path="$(nix build --no-link --print-out-paths .#darwinConfigurations.macbook.system)"
          echo "store_path=$store_path" >> "$GITHUB_OUTPUT"

      - name: Push macbook Closure To Cachix
        run: nix run nixpkgs#cachix -- push "$CACHIX_CACHE_NAME" '${{ steps.build.outputs.store_path }}'

      - name: Activate macbook Agent
        run: |
          jq -n \
            --arg agent "$AGENT_NAME" \
            --arg path '${{ steps.build.outputs.store_path }}' \
            '{agents: {($agent): $path}}' > deploy.json
          nix run nixpkgs#cachix -- deploy activate deploy.json --agent "$AGENT_NAME"
