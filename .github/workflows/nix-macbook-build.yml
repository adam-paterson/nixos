name: macbook System Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: false
        default: main
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  macbook-system-build:
    name: Build macbook Darwin And Home
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build macbook Darwin System
        run: nix build --print-build-logs --no-link '.#darwinConfigurations.macbook.system'

      - name: Build macbook Home Manager
        run: nix build --print-build-logs --no-link '.#homeConfigurations."adampaterson@macbook".activationPackage'
