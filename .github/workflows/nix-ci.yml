name: Nix CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-check-eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix (read-only)
        if: github.event_name == 'pull_request' && vars.CACHIX_CACHE_NAME != ''
        uses: cachix/cachix-action@v16
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          skipPush: true

      - name: Validate Cachix config
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          test -n "${CACHIX_CACHE_NAME}"
          test -n "${CACHIX_AUTH_TOKEN}"

      - name: Setup Cachix (push on main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cachix/cachix-action@v16
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Install just
        run: nix profile install nixpkgs#just

      - name: Format check
        run: just fmt-check

      - name: Lint
        run: just lint

      - name: Flake checks
        run: just check

      - name: Evaluate configurations
        run: just eval

      - name: Build Aurora system (populate binary cache)
        run: nix build .#nixosConfigurations.aurora.config.system.build.toplevel
