name: Nix CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/.ghcup
          docker system prune -af || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Install just
        run: nix profile add nixpkgs#just

      - name: Format check
        run: just fmt-check

      - name: Lint
        run: just lint

      - name: Flake checks
        run: just check

      - name: Evaluate configurations
        run: just eval

  build-aurora-cache:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME || secrets.CACHIX_CACHE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/.ghcup
          docker system prune -af || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Validate Cachix config
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          test -n "${CACHIX_CACHE_NAME}"
          test -n "${CACHIX_AUTH_TOKEN}"

      - name: Setup Cachix (push)
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Reclaim Nix store space before build
        run: |
          nix store gc
          df -h
          du -sh /nix/store || true

      - name: Build Aurora system (populate binary cache)
        id: build_aurora
        continue-on-error: true
        run: nix build --print-build-logs .#nixosConfigurations.aurora.config.system.build.toplevel

      - name: Build diagnostics
        if: steps.build_aurora.outcome == 'failure'
        run: |
          echo "Aurora build failed; collecting diagnostics."
          df -h
          du -sh /nix/store || true
          nix path-info -S .#nixosConfigurations.aurora.config.system.build.toplevel || true

      - name: Fail if Aurora build failed
        if: steps.build_aurora.outcome == 'failure'
        run: exit 1
