name: Deploy aurora

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "flake.nix"
      - "flake.lock"
      - "src/**/*.nix"
      - ".github/workflows/deploy-aurora.yml"

concurrency:
  group: deploy-aurora
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy NixOS to aurora
    runs-on: ubuntu-latest
    environment: aurora-production
    permissions:
      contents: read

    env:
      AURORA_USER: ${{ secrets.AURORA_SSH_USER }}
      AURORA_HOST: ${{ secrets.AURORA_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${AURORA_USER}"
          test -n "${AURORA_HOST}"
          test -n "${{ secrets.AURORA_SSH_PRIVATE_KEY }}"
          test -n "${{ secrets.AURORA_KNOWN_HOSTS }}"
          test -n "${{ secrets.TS_TAILNET }}"
          test -n "${{ secrets.TS_OAUTH_CLIENT_ID }}"
          test -n "${{ secrets.TS_OAUTH_CLIENT_SECRET }}"

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tailnet: ${{ secrets.TS_TAILNET }}
          tags: tag:gha-deploy

      - name: Configure SSH key and known_hosts
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.AURORA_SSH_PRIVATE_KEY }}" > ~/.ssh/aurora_key
          chmod 600 ~/.ssh/aurora_key
          printf '%s\n' "${{ secrets.AURORA_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Preflight SSH
        env:
          NIX_SSHOPTS: >-
            -i ~/.ssh/aurora_key
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=~/.ssh/known_hosts
        run: |
          ssh ${NIX_SSHOPTS} "${AURORA_USER}@${AURORA_HOST}" "echo preflight-ok"

      - name: Evaluate target configuration
        run: nix eval .#nixosConfigurations.aurora.config.system.build.toplevel.drvPath

      - name: Deploy
        env:
          NIX_SSHOPTS: >-
            -i ~/.ssh/aurora_key
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=~/.ssh/known_hosts
        run: |
          nix run nixpkgs#nixos-rebuild -- switch \
            --flake .#aurora \
            --build-host "${AURORA_USER}@${AURORA_HOST}" \
            --target-host "${AURORA_USER}@${AURORA_HOST}" \
            --sudo
