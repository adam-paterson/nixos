name: Nix Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-eval:
    name: Lint And Eval
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free Disk Space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/.ghcup
          docker system prune -af || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Format Check
        run: nix develop .#ci -c fmt-check

      - name: Lint
        run: nix develop .#ci -c lint

      - name: Flake Checks
        run: nix develop .#ci -c check

      - name: Evaluate Configurations
        run: nix develop .#ci -c eval

      - name: Secrets Scan
        env:
          SECRETS_SCAN_SCOPE: ${{ github.event_name == 'pull_request' && 'diff-base' || 'full' }}
          SECRETS_SCAN_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: nix develop .#ci -c secrets-scan
