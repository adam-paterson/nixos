name: Nix Checks

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-quality-and-eval:
    name: Linux Quality And Eval
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free Disk Space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/.ghcup
          docker system prune -af || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Format Check
        run: nix run nixpkgs#just -- fmt-check

      - name: Lint
        run: nix run nixpkgs#just -- lint

      - name: Flake Checks
        run: nix run nixpkgs#just -- check

      - name: Evaluate Configurations
        run: nix run nixpkgs#just -- eval

      - name: Dry-Run Linux Devshell Build
        run: nix build --no-link '.#devShells.x86_64-linux.default'

  macos-eval-and-build:
    name: macOS Eval And Build
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Evaluate macOS Config
        run: |
          nix eval .#darwinConfigurations.macbook.config.networking.hostName
          nix eval '.#homeConfigurations."adampaterson@macbook".activationPackage.drvPath'

      - name: Dry-Run macOS Home Manager Build
        run: nix build --no-link '.#homeConfigurations."adampaterson@macbook".activationPackage'

      - name: Dry-Run macOS Devshell Build
        run: nix build --no-link '.#devShells.aarch64-darwin.default'
