name: Nix Checks

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-eval-linux:
    name: Lint and Eval (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/.ghcup
          docker system prune -af || true
          df -h

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Install just
        run: nix profile add nixpkgs#just

      - name: Format check
        run: just fmt-check

      - name: Lint
        run: just lint

      - name: Flake checks
        run: just check

      - name: Evaluate configurations
        run: just eval

  eval-macos:
    name: macOS Configuration Checks
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Evaluate macOS config
        run: |
          nix eval .#darwinConfigurations.macbook.config.networking.hostName
          nix eval '.#homeConfigurations."adampaterson@macbook".activationPackage.drvPath'

      - name: Dry-run macOS Home Manager build
        run: nix build '.#homeConfigurations."adampaterson@macbook".activationPackage' --dry-run
