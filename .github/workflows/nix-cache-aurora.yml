name: NixOS Cache Build

on:
  workflow_run:
    workflows:
      - NixOS System Build
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: false
        default: main
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Resolve Build Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.compute.outputs.should_run }}
      build_ref: ${{ steps.compute.outputs.build_ref }}
      cache_name: ${{ steps.compute.outputs.cache_name }}
    steps:
      - name: Compute Metadata
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          INPUT_REF: ${{ github.event.inputs.ref || '' }}
          CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
        run: |
          set -euo pipefail

          should_run=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            should_run=true
          elif [ "$EVENT_NAME" = "workflow_run" ] && [ "$WORKFLOW_CONCLUSION" = "success" ]; then
            should_run=true
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            build_ref="${INPUT_REF:-main}"
          else
            build_ref="$WORKFLOW_HEAD_SHA"
          fi

          cache_name="${CACHE_NAME:-adam-paterson}"

          {
            echo "should_run=$should_run"
            echo "build_ref=$build_ref"
            echo "cache_name=$cache_name"
          } >> "$GITHUB_OUTPUT"

  nixos-cache-targets:
    name: Cache NixOS Targets (aurora)
    needs: metadata
    if: needs.metadata.outputs.should_run == 'true'
    uses: ./.github/workflows/_nix-build-and-push-cache.yml
    with:
      job_name: Build And Push NixOS Targets (aurora)
      runs_on: ubuntu-latest
      checkout_ref: ${{ needs.metadata.outputs.build_ref }}
      cache_name: ${{ needs.metadata.outputs.cache_name }}
      reclaim_disk: true
      build_command: |
        nix build --print-build-logs --no-link \
          .#devShells.x86_64-linux.default \
          .#nixosConfigurations.aurora.config.system.build.toplevel
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
